name: Deploy to Cloudflare

# Rulează la push pe main sau manual (Actions → Run workflow).
# Schimbă `main` cu branch-ul tău dacă vrei deploy de pe altă ramură.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-apg-garage
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Apply D1 migrations (remote)
        run: npx wrangler d1 migrations apply apg-garage --remote

      - name: Sync Worker secrets
        env:
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          if [ -n "$SESSION_SECRET" ]; then
            printf '%s' "$SESSION_SECRET" | npx wrangler secret put SESSION_SECRET
          fi
          if [ -n "$RESEND_API_KEY" ]; then
            printf '%s' "$RESEND_API_KEY" | npx wrangler secret put RESEND_API_KEY
          fi

      - name: Deploy
        run: npx wrangler deploy
